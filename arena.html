<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ArenaX Survival</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#080511;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.screen{
width:100%;
max-width:900px;
background:#151022;
border:2px solid #8d4cff;
border-radius:20px;
padding:30px;
text-align:center;
}

h1{
margin-bottom:20px;
color:#d8a8ff;
}

.fighters{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:15px;
margin:25px 0;
}

.fighter{
background:#221733;
padding:20px;
border-radius:15px;
cursor:pointer;
border:2px solid transparent;
}

.fighter:hover{
border-color:#8d4cff;
}

.selected{
border-color:#ff7b00;
}

.enemy{
font-size:2rem;
margin:20px 0;
}

.bar{
height:25px;
background:#333;
border-radius:20px;
overflow:hidden;
margin-bottom:15px;
}

.fill{
height:100%;
background:#00ff88;
width:100%;
transition:.3s;
}

.enemyFill{
background:#ff5555;
}

.actions{
display:flex;
gap:15px;
justify-content:center;
flex-wrap:wrap;
margin-top:25px;
}

button{
padding:15px 25px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
color:white;
}

.attack{
background:#ff5555;
}

.block{
background:#4d7cff;
}

.special{
background:#a855ff;
}

.log{
margin-top:25px;
background:#0f0a19;
padding:15px;
border-radius:10px;
min-height:100px;
text-align:left;
}

.hidden{
display:none;
}

.points{
font-size:1.2rem;
margin-bottom:15px;
color:#ffd166;
}

.round{
font-size:1.3rem;
margin-bottom:15px;
}

</style>
</head>
<body>

<div id="selectScreen" class="screen">

<h1>⚔️ CHOOSE YOUR FIGHTER ⚔️</h1>

<div class="fighters">

<div class="fighter" onclick="pick('💪 Chad Destroyer')">
💪 Chad Destroyer
</div>

<div class="fighter" onclick="pick('🐸 Pepe Assassin')">
🐸 Pepe Assassin
</div>

<div class="fighter" onclick="pick('🌙 Moon King')">
🌙 Moon King
</div>

<div class="fighter" onclick="pick('👹 Rug Goblin')">
👹 Rug Goblin
</div>

<div class="fighter" onclick="pick('💎 Diamond Hands')">
💎 Diamond Hands
</div>

</div>

<button class="special" onclick="startGame()">
START RUN
</button>

</div>

<div id="gameScreen" class="screen hidden">

<h1>⚔️ ARENAX SURVIVAL ⚔️</h1>

<div class="points">
Arena Points:
<span id="points">0</span>
</div>

<div class="round">
Round <span id="round">1</span>
</div>

<div class="enemy" id="enemyName">
👹 Rug Goblin
</div>

<h3>Your HP</h3>
<div class="bar">
<div id="playerBar" class="fill"></div>
</div>

<h3>Enemy HP</h3>
<div class="bar">
<div id="enemyBar" class="fill enemyFill"></div>
</div>

<div class="actions">

<button class="attack" onclick="attack()">
⚔️ ATTACK
</button>

<button class="block" onclick="blockMove()">
🛡️ BLOCK
</button>

<button class="special" onclick="special()">
💥 SPECIAL
</button>

</div>

<div id="log" class="log">
Welcome to ArenaX.
</div>

</div>

<script>

let chosen=null;

let playerHP=100;
let enemyHP=100;

let points=0;
let round=1;

let blocked=false;

const enemies=[
"👹 Rug Goblin",
"🐸 Pepe Assassin",
"🌙 Moon King",
"💎 Diamond Hands",
"💪 Chad Destroyer"
];

function pick(name){

chosen=name;

document
.querySelectorAll(".fighter")
.forEach(f=>f.classList.remove("selected"));

event.target.classList.add("selected");

}

function startGame(){

if(!chosen){

alert("Choose a fighter");

return;

}

document
.getElementById("selectScreen")
.classList.add("hidden");

document
.getElementById("gameScreen")
.classList.remove("hidden");

update();

}

function update(){

document
.getElementById("playerBar")
.style.width=playerHP+"%";

document
.getElementById("enemyBar")
.style.width=enemyHP+"%";

document
.getElementById("points")
.innerText=points;

document
.getElementById("round")
.innerText=round;

document
.getElementById("enemyName")
.innerText=enemies[round-1];

}

function write(text){

document
.getElementById("log")
.innerHTML=text;

}

function attack(){

let dmg=Math.floor(Math.random()*20)+10;

enemyHP-=dmg;

write("⚔️ You dealt "+dmg+" damage.");

check();

enemyTurn();

}

function blockMove(){

blocked=true;

write("🛡️ You prepare to block.");

enemyTurn();

}

function special(){

let dmg=Math.floor(Math.random()*35)+20;

enemyHP-=dmg;

write("💥 Special attack dealt "+dmg+" damage!");

check();

enemyTurn();

}

function enemyTurn(){

if(enemyHP<=0)return;

let dmg=Math.floor(Math.random()*18)+8;

if(blocked){

dmg=Math.floor(dmg/2);

blocked=false;

}

playerHP-=dmg;

write(
document.getElementById("log").innerHTML+
"<br>Enemy dealt "+dmg+" damage."
);

if(playerHP<=0){

lose();

}

update();

}

function check(){

if(enemyHP<=0){

points+=round*100;

round++;

if(round>5){

win();

return;

}

enemyHP=100;

write("🏆 Round cleared!");

}

update();

}

function lose(){

document.body.innerHTML=
`
<div class="screen">
<h1>☠️ DEFEATED</h1>
<p>You earned ${points} Arena Points</p>
<br>
<button onclick="location.reload()">
Try Again
</button>
</div>
`;

}

function win(){

document.body.innerHTML=
`
<div class="screen">
<h1>🏆 ARENA CHAMPION</h1>
<p>Total Arena Points: ${points}</p>
<br>
<button onclick="location.reload()">
Play Again
</button>
</div>
`;

}

</script>

</body>
</html>
