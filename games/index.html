<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArenaX Meme Maze</title>

<link rel="stylesheet" href="meme-maze.css">
</head>
<body>

<div id="menu">

<h1>⚔️ ARENAX MEME MAZE ⚔️</h1>

<h2>Select Your Meme</h2>

<div id="fighters">

<button onclick="startGame('chad_head.png')">
  <img src="/chad_head.png">
  CHAD
</button>

<button onclick="startGame('pepe_head.png')">
  <img src="/pepe_head.png">
  PEPE
</button>

<button onclick="startGame('wojak_head.png')">
  <img src="/wojak_head.png">
WOJAK
</button>

<button onclick="startGame('goblin_head.png')">
  <img src="/goblin_head.png">
GOBLIN
</button>

<button onclick="startGame('moonking_head.png')">
  <img src="/moonking_head.png">
MOONKING
</button>

<button onclick="startGame('hodl_head.png')">
  <img src="/hodl_head.png">
HODL
</button>

</div>

</div>

<div id="game">

<div id="hud">

<div id="score">
SCORE: 0
</div>

</div>

<canvas id="maze"></canvas>

<div id="controls">

<h3>🎮 HOW TO PLAY</h3>

<p>W = Move Up</p>
<p>S = Move Down</p>
<p>A = Move Left</p>
<p>D = Move Right</p>

<p>🟣 Collect Solana Coins</p>

<p>🏆 Become the Arena Champion</p>

</div>

</div>

<script src="meme-maze.js"></script>

</body>
</html>
